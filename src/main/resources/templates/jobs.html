<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ジョブ一覧</title>
</head>
<body>
    <h1>ジョブ一覧</h1>

    <table border="1">
        <tr th:each="job : ${jobs}">
            <td th:text="${job.id}"></td>
            <td th:text="${job.jobName}"></td>
            <td th:text="${job.status}"></td>
        </tr>
    </table>
</body>
</html>
