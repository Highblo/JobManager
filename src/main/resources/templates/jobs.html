<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>ジョブ一覧</title>
</head>

<body style="background-color:#f5f7fa;">
    <div class="card shadow container p-5 mt-5">
        <h1 class="mb-4">ジョブ一覧</h1>
        <form th:action="@{/jobs/search}" method="get" class="mb-4">
            <div class="input-group">
                <input type="text" name="keyword" class="form-control" placeholder="ジョブ名で検索">
                <button type="submit" class="btn btn-primary">検索</button>
                <a th:href="@{/jobs}" class="btn btn-secondary">全件表示</a>
            </div>
        </form>
        <form th:action="@{/jobs}" method="post">
            <div class="mb-3">
                <label class="form-label">ジョブ名</label>
                <input type="text" name="jobName" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">ステータス</label>
                <select name="status" class="form-select">
                    <option value="正常終了">正常終了</option>
                    <option value="実行中">実行中</option>
                    <option value="異常終了">異常終了</option>
                </select>
            </div>
            <div class="mb-1 text-center">
                <button type="submit" class="btn btn-primary px-5">登録</button>
            </div>
        </form>
        <br>
        <table border="1" class="table table-striped table-hover">
            <tr>
                <th>ID</th>
                <th>ジョブ名</th>
                <th>ステータス</th>
                <th>操作</th>
            </tr>
            <tr th:each="job : ${jobs}">
                <td th:text="${job.id}"></td>
                <td th:text="${job.jobName}"></td>
                <td th:text="${job.status}"></td>
                <td>
                    <a th:href="@{/jobs/edit/{id}(id=${job.id})}" class="btn btn-success btn-sm">編集</a>
                    <form th:action="@{/jobs/delete/{id}(id=${job.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-danger btn-sm">削除</button>
                    </form>
                </td>
            </tr>
        </table>
    </div>
</body>

</html>
