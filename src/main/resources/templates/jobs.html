<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ジョブ一覧</title>
</head>

<body>
    <h1>ジョブ一覧</h1>
    <form th:action="@{/jobs}" method="post">
        <label>ジョブ名</label>
        <input type="text" name="jobName">
        <label>ステータス</label>
        <select name="status">
            <option value="正常終了">正常終了</option>
            <option value="実行中">実行中</option>
            <option value="異常終了">異常終了</option>
        </select>
        <button type="submit">登録</button>
    </form>
    <br>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>ジョブ名</th>
            <th>ステータス</th>
            <th>操作</th>
        </tr>
        <tr th:each="job : ${jobs}">
            <td th:text="${job.id}"></td>
            <td th:text="${job.jobName}"></td>
            <td th:text="${job.status}"></td>
            <td>
                <a th:href="@{/jobs/edit/{id}(id=${job.id})}">編集</a>
                <form th:action="@{/jobs/delete/{id}(id=${job.id})}" method="post" style="display:inline;">
                    <button type="submit">削除</button>
                </form>
            </td>
        </tr>
    </table>
</body>
</html>
